[package]
name = "zweb"
version = "0.1.0"
edition = "2024"

[dependencies]
wry = "0.55"
tao = "0.35"
windows = { version = "0.61", features = [
    "Win32_Foundation",
    "Win32_Graphics_Dwm",
    "Win32_System_Registry",
] }
tiny_http = "0.12"
serde_json = "1"

[profile.release]
lto = true
strip = true
codegen-units = 1
opt-level = 2
panic = "abort"