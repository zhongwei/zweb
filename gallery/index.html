<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gallery</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="toolbar">
    <div class="breadcrumb" id="breadcrumb">
      <span class="bc-link" id="bcHome">Gallery</span>
      <span class="bc-sep" id="bcSep" style="display:none"> › </span>
      <span class="bc-current" id="bcCurrent" style="display:none"></span>
    </div>
    <button class="btn btn-random" id="btnRandom" title="Random album">🎲</button>
    <div class="controls">
      <button class="btn active" data-cols="4">4列</button>
      <button class="btn" data-cols="3">3列</button>
      <button class="btn" data-cols="2">2列</button>
      <span class="status-dot checking" id="statusDot"></span>
    </div>
  </header>
  <main class="gallery" id="gallery"></main>
  <div class="viewer" id="viewer">
    <button class="viewer-close" id="viewerClose">✕</button>
    <button class="viewer-heart" id="viewerHeart" style="display:none"></button>
    <img id="viewerImage" src="" alt="" />
  </div>
  <div class="toast" id="toast"><span class="toast-icon"></span><span class="toast-msg">Server offline</span></div>
  <script src="meta/data.js"></script>
  <script src="meta/likes.js"></script>
  <script src="main.js"></script>
</body>
</html>
